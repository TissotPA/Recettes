<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Recettes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-bg"></div>
  <main class="app">
    <header class="hero">
      <h1>Mes Recettes</h1>
      <p>Garde tes fiches, ajuste les quantites, et cuisine avec ce que tu as deja.</p>
      <div class="toolbar">
        <button id="loadBtn" class="btn btn-primary" type="button">Charger</button>
        <button id="saveBtn" class="btn btn-success" type="button" title="Maj+clic pour changer la clé">Enregistrer</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </header>

    <section class="panel filters">
      <h2>Recherche</h2>
      <div class="filter-grid">
        <label>
          Nom de recette
          <input id="searchByName" type="text" placeholder="Ex: tarte aux pommes" />
        </label>

        <label>
          Ingredients a inclure (separes par des virgules)
          <input id="searchByIngredients" type="text" placeholder="Ex: tomate, basilic" />
        </label>

        <label>
          Ingredients du frigo (separes par des virgules)
          <input id="fridgeIngredients" type="text" placeholder="Ex: oeufs, farine, lait" />
        </label>
      </div>
    </section>

    <section class="content-grid">
      <section class="panel">
        <h2>Recettes</h2>
        <div id="recipeList" class="recipe-list"></div>
      </section>

      <section class="panel detail-panel">
        <h2>Fiche recette</h2>
        <div id="recipeDetail" class="recipe-detail empty-state">
          Selectionne une recette pour voir le detail.
        </div>
      </section>
    </section>
  </main>

  <dialog id="patDialog" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Clé d'accès GitHub</h2>
      </div>
      <div class="modal-body">
        <p class="pat-hint">Saisie une seule fois par appareil. Maj+clic sur « Enregistrer » pour la changer.</p>
        <label>
          Clé personnelle (GitHub PAT)
          <input id="patInput" type="password" placeholder="github_pat_..." autocomplete="off" />
        </label>
      </div>
      <div class="modal-footer">
        <button id="patCancelBtn" class="btn" type="button">Annuler</button>
        <button id="patConfirmBtn" class="btn btn-primary" type="button">Valider</button>
      </div>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
