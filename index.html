<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Recettes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-bg"></div>
  <main class="app">
    <header class="hero">
      <h1>Mes Recettes</h1>
      <p>Garde tes fiches, ajuste les quantites, et cuisine avec ce que tu as deja.</p>
      <div class="toolbar">
        <button id="openAddRecipeBtn" class="btn btn-primary" type="button">Ajouter une recette</button>
        <button id="exportBtn" class="btn" type="button">Exporter</button>
        <button id="loadBtn" class="btn" type="button">Charger</button>
      </div>
      <p id="status" class="status" aria-live="polite"></p>
    </header>

    <section class="panel filters">
      <h2>Recherche</h2>
      <div class="filter-grid">
        <label>
          Nom de recette
          <input id="searchByName" type="text" placeholder="Ex: tarte aux pommes" />
        </label>

        <label>
          Ingredients a inclure (separes par des virgules)
          <input id="searchByIngredients" type="text" placeholder="Ex: tomate, basilic" />
        </label>

        <label>
          Ingredients du frigo (separes par des virgules)
          <input id="fridgeIngredients" type="text" placeholder="Ex: oeufs, farine, lait" />
        </label>
      </div>
    </section>

    <section class="content-grid">
      <section class="panel">
        <h2>Recettes</h2>
        <div id="recipeList" class="recipe-list"></div>
      </section>

      <section class="panel detail-panel">
        <h2>Fiche recette</h2>
        <div id="recipeDetail" class="recipe-detail empty-state">
          Selectionne une recette pour voir le detail.
        </div>
      </section>
    </section>
  </main>

  <dialog id="addRecipeDialog" class="modal">
    <form id="addRecipeForm" method="dialog" class="modal-content">
      <header class="modal-header">
        <h2>Nouvelle recette</h2>
      </header>

      <div class="modal-body">
        <label>
          Nom
          <input name="name" type="text" required />
        </label>

        <label>
          Categorie
          <select name="category" required>
            <option value="Entree">Entree</option>
            <option value="Plat">Plat</option>
            <option value="Dessert">Dessert</option>
          </select>
        </label>

        <section>
          <div class="inline-title-row">
            <h3>Ingredients (base 4 personnes)</h3>
            <button id="addIngredientRowBtn" class="btn btn-small" type="button">+ Ingredient</button>
          </div>
          <div id="ingredientsRows" class="stack"></div>
        </section>

        <label>
          Etapes (une ligne = une etape)
          <textarea name="steps" rows="6" required placeholder="Prechauffer le four...\nMelanger...\nCuire..."></textarea>
        </label>

        <label>
          Boissons conseillees (optionnel, une par ligne)
          <textarea name="drinks" rows="4" placeholder="Eau petillante\nVin blanc sec"></textarea>
        </label>
      </div>

      <footer class="modal-footer">
        <button id="cancelAddRecipeBtn" class="btn" type="button">Annuler</button>
        <button class="btn btn-primary" type="submit">Enregistrer</button>
      </footer>
    </form>
  </dialog>

  <template id="ingredientRowTemplate">
    <div class="ingredient-row">
      <input class="ingredient-name" type="text" placeholder="Ingredient" required />
      <input class="ingredient-quantity" type="number" step="0.01" min="0" placeholder="Quantite" required />
      <input class="ingredient-unit" type="text" placeholder="Unite (g, cl, piece...)" />
      <button class="btn btn-small btn-danger remove-ingredient-btn" type="button">Retirer</button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
